# L'Échelon — Nginx config
# Deploy to: /etc/nginx/sites-available/lechelon
# Then: ln -s /etc/nginx/sites-available/lechelon /etc/nginx/sites-enabled/lechelon
# Then: nginx -t && systemctl reload nginx

# Main site — lechelon.com
server {
    listen 80;
    server_name lechelon.com www.lechelon.com;
    return 301 https://lechelon.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name lechelon.com www.lechelon.com;

    ssl_certificate     /etc/letsencrypt/live/lechelon.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lechelon.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Redirect www → non-www
    if ($host = www.lechelon.com) {
        return 301 https://lechelon.com$request_uri;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy to Next.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Static assets — cache aggressively
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}

# CMS — cms.lechelon.com
server {
    listen 80;
    server_name cms.lechelon.com;
    return 301 https://cms.lechelon.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cms.lechelon.com;

    ssl_certificate     /etc/letsencrypt/live/cms.lechelon.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cms.lechelon.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy to Strapi
    location / {
        proxy_pass         http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Strapi uploads
    location /uploads/ {
        proxy_pass http://127.0.0.1:1337/uploads/;
        expires 30d;
        add_header Cache-Control "public";
    }
}
